<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITTE Village Connect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #2b7a3d;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
        }
        .container {
            padding: 20px;
        }
        .shop-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .shop-title {
            font-size: 20px;
            font-weight: bold;
        }
        iframe {
            width: 100%;
            height: 250px;
            border: 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
    NITTE Village Connect
</header>

<div class="container">

    <div class="shop-card">
        <div class="shop-title">Anand Grocery Store</div>
        <p><strong>Category:</strong> Grocery</p>
        <p><strong>Facilities:</strong> Home Delivery, UPI Payment</p>
        <p><strong>Phone:</strong> +91 9876543210</p>

        <!-- Replace the src link with the shop’s Google Maps embed link -->
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!...">
        </iframe>
    </div>

    <div class="shop-card">
        <div class="shop-title">Nitte Medicals</div>
        <p><strong>Category:</strong> Pharmacy</p>
        <p><strong>Facilities:</strong> 24/7 Service</p>
        <p><strong>Phone:</strong> +91 9876543211</p>

        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!...">
        </iframe>
    </div>

</div>

</body>
</html>
